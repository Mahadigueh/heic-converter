<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outil Tout-en-Un - replygen.ca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .tool-card { transition: all 0.3s ease; }
        .tool-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-6xl mx-auto py-16 px-6">
        <div class="text-center mb-16">
            <h1 class="text-6xl font-bold text-gray-900 mb-4">replygen.ca</h1>
            <p class="text-2xl text-gray-600">Outil Tout-en-Un de conversion de fichiers</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <a href="/heic" class="tool-card bg-white rounded-3xl p-10 text-center border border-purple-200 hover:border-purple-500">
                <i class="fas fa-image text-6xl text-purple-500 mb-6"></i>
                <h3 class="text-2xl font-semibold mb-3">HEIC → PNG/JPG</h3>
                <p class="text-gray-600">Conversion rapide des photos iPhone</p>
            </a>

            <a href="/merge" class="tool-card bg-white rounded-3xl p-10 text-center border border-red-200 hover:border-red-500">
                <i class="fas fa-file-pdf text-6xl text-red-500 mb-6"></i>
                <h3 class="text-2xl font-semibold mb-3">Fusionner PDF</h3>
                <p class="text-gray-600">Combiner plusieurs PDF</p>
            </a>

            <a href="/pdf-to-word" class="tool-card bg-white rounded-3xl p-10 text-center border border-blue-200 hover:border-blue-500">
                <i class="fas fa-file-word text-6xl text-blue-600 mb-6"></i>
                <h3 class="text-2xl font-semibold mb-3">PDF → Word</h3>
                <p class="text-gray-600">Convertir en document éditable</p>
            </a>

            <a href="/compress" class="tool-card bg-white rounded-3xl p-10 text-center border border-amber-200 hover:border-amber-500">
                <i class="fas fa-compress text-6xl text-amber-500 mb-6"></i>
                <h3 class="text-2xl font-semibold mb-3">Compresser PDF</h3>
                <p class="text-gray-600">Réduire la taille du fichier</p>
            </a>
        </div>
    </div>
</body>
</html>
