<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outil Tout-en-Un - replygen.ca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .drop-zone { transition: all 0.3s ease; }
        .drop-zone.dragover { background-color: #f3e8ff; border-color: #7c3aed; transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-6xl mx-auto py-8 px-6">
        <div class="flex justify-between items-center mb-10">
            <h1 onclick="window.location.href='/'" class="text-4xl font-bold cursor-pointer">replygen.ca</h1>
            <a href="/" class="text-purple-600 hover:underline">Accueil</a>
        </div>

        <div id="tool-content">
            <!-- HEIC (Accueil) -->
            <div class="text-center">
                <h2 class="text-5xl font-bold mb-4">Outil Tout-en-Un</h2>
                <p class="text-xl text-gray-600">Choisis ton outil ci-dessous</p>
            </div>
        </div>
    </div>

    <script>
        // Navigation simple
        document.querySelectorAll('a[href^="/"]').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.getAttribute('href') !== '/') {
                    e.preventDefault();
                    alert("Page en cours de développement. Le backend est prêt, on va ajouter le frontend complet pour chaque outil.");
                }
            });
        });
    </script>
</body>
</html>
