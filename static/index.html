<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outil Tout-en-Un - replygen.ca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .drop-zone { transition: all 0.3s ease; }
        .drop-zone.dragover { background-color: #f3e8ff; border-color: #7c3aed; transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-6xl mx-auto py-8 px-6">
        <div class="flex justify-between items-center mb-10">
            <h1 onclick="goHome()" class="text-4xl font-bold cursor-pointer text-gray-900">replygen.ca</h1>
            <button onclick="goHome()" class="px-6 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-2xl">Accueil</button>
        </div>

        <div id="main-content">
            <!-- HEIC - Page par défaut -->
            <div class="max-w-2xl mx-auto">
                <h2 class="text-4xl font-bold text-center mb-8">HEIC → PNG / JPG</h2>
                <div id="drop-zone" class="drop-zone border-4 border-dashed border-gray-300 rounded-3xl p-20 text-center cursor-pointer bg-white">
                    <i class="fas fa-cloud-upload-alt text-7xl text-gray-400 mb-6"></i>
                    <p class="text-2xl font-medium">Dépose tes photos HEIC ici</p>
                    <input type="file" id="file-input" accept=".heic,.heif" multiple class="hidden">
                </div>
                <button onclick="convertHEIC()" class="mt-10 w-full bg-purple-600 hover:bg-purple-700 text-white py-6 rounded-3xl text-xl font-semibold">Convertir</button>
            </div>
        </div>
    </div>

    <script>
        function goHome() {
            window.location.reload();
        }

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
        });

        async function convertHEIC() {
            const files = fileInput.files;
            if (files.length === 0) return alert("Sélectionne au moins une photo HEIC");

            const formData = new FormData();
            for (let file of files) formData.append('files', file);
            formData.append('format', 'png');

            try {
                const res = await fetch('/convert-heic', { method: 'POST', body: formData });
                if (!res.ok) throw new Error("Erreur");

                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = files.length > 1 ? "heic_converted.zip" : "converted.png";
                a.click();
            } catch (e) {
                alert("Erreur lors de la conversion");
            }
        }
    </script>
</body>
</html>
