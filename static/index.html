<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outil Tout-en-Un - replygen.ca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .drop-zone { transition: all 0.3s ease; }
        .drop-zone.dragover { background-color: #f3e8ff; border-color: #7c3aed; transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-2xl mx-auto py-12 px-6">
        <h1 onclick="window.location.reload()" class="text-4xl font-bold text-center cursor-pointer mb-10">replygen.ca</h1>
        
        <div class="text-center mb-10">
            <h2 class="text-4xl font-bold">HEIC → PNG / JPG</h2>
            <p class="text-gray-600 mt-2">Convertisseur rapide pour photos iPhone</p>
        </div>

        <div id="drop-zone" class="drop-zone border-4 border-dashed border-gray-300 rounded-3xl p-20 text-center cursor-pointer bg-white">
            <i class="fas fa-cloud-upload-alt text-7xl text-gray-400 mb-6"></i>
            <p class="text-2xl font-medium">Dépose tes photos HEIC ici</p>
            <p class="text-gray-500 mt-2">ou clique pour sélectionner</p>
            <input type="file" id="file-input" accept=".heic,.heif" multiple class="hidden">
        </div>

        <!-- Zone de progression -->
        <div id="progress-area" class="hidden mt-10">
            <div class="flex justify-between text-sm mb-2">
                <span id="status-text" class="font-medium">Conversion en cours...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="h-3 bg-gray-200 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-purple-600 w-0 transition-all duration-300"></div>
            </div>
            <p class="text-center text-sm text-gray-500 mt-4">Cela peut prendre 15 à 45 secondes selon le nombre de photos</p>
        </div>

        <button onclick="convertHEIC()" 
                class="mt-8 w-full bg-purple-600 hover:bg-purple-700 text-white py-6 rounded-3xl text-xl font-semibold">
            Convertir maintenant
        </button>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const progressArea = document.getElementById('progress-area');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const statusText = document.getElementById('status-text');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
        });

        async function convertHEIC() {
            const files = fileInput.files;
            if (files.length === 0) {
                alert("Veuillez sélectionner au moins une photo HEIC");
                return;
            }

            // Afficher la progression
            progressArea.classList.remove('hidden');
            progressBar.style.width = '0%';
            progressPercent.textContent = '0%';
            statusText.textContent = 'Conversion en cours...';

            const formData = new FormData();
            for (let file of files) formData.append('files', file);
            formData.append('format', 'png');

            try {
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 25 + 10;
                    if (progress > 92) progress = 92;
                    progressBar.style.width = `${progress}%`;
                    progressPercent.textContent = `${Math.round(progress)}%`;
                }, 400);

                const res = await fetch('/convert-heic', {
                    method: 'POST',
                    body: formData
                });

                clearInterval(interval);
                progressBar.style.width = '100%';
                progressPercent.textContent = '100%';
                statusText.textContent = 'Conversion terminée ! Téléchargement...';

                if (!res.ok) throw new Error("Erreur serveur");

                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = files.length > 1 ? "heic_converted_files.zip" : "converted_image.png";
                a.click();

                // Réinitialiser après téléchargement
                setTimeout(() => {
                    progressArea.classList.add('hidden');
                    fileInput.value = '';
                }, 1500);

            } catch (err) {
                alert("Erreur lors de la conversion. Réessaie.");
                progressArea.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
