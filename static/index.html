<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEIC → PNG/JPG - replygen.ca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .drop-zone { transition: all 0.3s ease; }
        .drop-zone.dragover { background-color: #f3e8ff; border-color: #7c3aed; transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-2xl mx-auto py-8 px-6">
        <!-- Navigation -->
        <div class="flex justify-between items-center mb-8">
            <h1 onclick="window.location.reload()" class="text-3xl font-bold cursor-pointer">replygen.ca</h1>
            <div class="flex gap-2 text-sm">
                <a href="/" class="px-4 py-2 bg-purple-600 text-white rounded-2xl">HEIC</a>
                <a href="/merge.html" class="px-4 py-2 hover:bg-gray-200 rounded-2xl">Fusion PDF</a>
                <a href="/pdf-to-word.html" class="px-4 py-2 hover:bg-gray-200 rounded-2xl">PDF → Word</a>
                <a href="/compress.html" class="px-4 py-2 hover:bg-gray-200 rounded-2xl">Compress PDF</a>
            </div>
        </div>

        <!-- HEIC Content (ton code actuel intact) -->
        <div class="text-center mb-10">
            <h2 class="text-5xl font-bold">HEIC → PNG / JPG</h2>
            <p class="text-gray-600 mt-3">Convertisseur rapide pour photos iPhone</p>
        </div>

        <div id="drop-zone" class="drop-zone border-4 border-dashed border-gray-300 rounded-3xl p-16 text-center cursor-pointer bg-white">
            <i id="drop-icon" class="fas fa-cloud-upload-alt text-7xl text-gray-400 mb-6"></i>
            <p id="drop-text" class="text-2xl font-medium">Dépose tes photos HEIC ici</p>
            <p id="drop-subtext" class="text-gray-500 mt-2">ou clique pour sélectionner</p>
            
            <div id="selected-files" class="hidden w-full mt-8 text-left max-h-48 overflow-y-auto"></div>
            
            <input type="file" id="file-input" accept=".heic,.heif" multiple class="hidden">
        </div>

        <!-- Barre de progression -->
        <div id="progress-area" class="hidden mt-10">
            <div class="flex justify-between text-sm mb-3">
                <span id="status-text" class="font-medium">Conversion en cours...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="h-4 bg-gray-200 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-purple-600 to-violet-600 w-0 transition-all"></div>
            </div>
        </div>

        <button onclick="convertHEIC()" id="convert-btn"
                class="mt-8 w-full bg-purple-600 hover:bg-purple-700 text-white py-6 rounded-3xl text-xl font-semibold">
            Convertir maintenant
        </button>
    </div>

    <script>
        // === Ton code actuel (inchangé) ===
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const selectedFilesDiv = document.getElementById('selected-files');
        const dropText = document.getElementById('drop-text');
        const dropSubtext = document.getElementById('drop-subtext');
        const dropIcon = document.getElementById('drop-icon');
        const progressArea = document.getElementById('progress-area');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const statusText = document.getElementById('status-text');
        const convertBtn = document.getElementById('convert-btn');

        let selectedFiles = [];

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

        fileInput.addEventListener('change', () => handleFiles(fileInput.files));

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            if (selectedFiles.length === 0) return;

            let html = `<p class="font-medium mb-2">Fichiers sélectionnés (${selectedFiles.length}) :</p>`;
            selectedFiles.forEach(f => html += `<div class="text-sm text-gray-700 py-1">✅ ${f.name}</div>`);
            selectedFilesDiv.innerHTML = html;
            selectedFilesDiv.classList.remove('hidden');

            dropText.textContent = "Fichiers prêts à convertir";
            dropSubtext.textContent = "Clique sur le bouton ci-dessous";
            dropIcon.classList.remove('fa-cloud-upload-alt');
            dropIcon.classList.add('fa-check-circle', 'text-green-500');
        }

        async function convertHEIC() {
            if (selectedFiles.length === 0) return alert("Sélectionne au moins une photo");

            progressArea.classList.remove('hidden');
            convertBtn.disabled = true;

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 22 + 12;
                if (progress > 92) progress = 92;
                progressBar.style.width = `${progress}%`;
                progressPercent.textContent = `${Math.round(progress)}%`;
            }, 380);

            try {
                const formData = new FormData();
                selectedFiles.forEach(file => formData.append('files', file));
                formData.append('format', 'png');

                const res = await fetch('/convert-heic', { method: 'POST', body: formData });

                clearInterval(interval);
                progressBar.style.width = '100%';
                progressPercent.textContent = '100%';
                statusText.textContent = 'Terminé ! Téléchargement...';

                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = selectedFiles.length > 1 ? "heic_converted_files.zip" : "converted_image.png";
                a.click();

                setTimeout(() => {
                    alert("✅ Conversion terminée et fichier téléchargé avec succès !");
                    resetUI();
                }, 1000);

            } catch (err) {
                alert("Erreur lors de la conversion.");
                resetUI();
            }
        }

        function resetUI() {
            progressArea.classList.add('hidden');
            selectedFilesDiv.classList.add('hidden');
            convertBtn.disabled = false;
            fileInput.value = '';
            dropText.textContent = "Dépose tes photos HEIC ici";
            dropSubtext.textContent = "ou clique pour sélectionner";
            dropIcon.classList.add('fa-cloud-upload-alt');
            dropIcon.classList.remove('fa-check-circle', 'text-green-500');
        }
    </script>
</body>
</html>
