<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outil Tout-en-Un - replygen.ca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .drop-zone { transition: all 0.3s ease; }
        .drop-zone.dragover { background-color: #f3e8ff; border-color: #7c3aed; transform: scale(1.02); }
        .tool-card:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-6xl mx-auto py-8 px-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <h1 onclick="goHome()" class="text-4xl font-bold cursor-pointer text-gray-900">replygen.ca</h1>
            <button onclick="goHome()" class="px-6 py-3 bg-purple-600 text-white rounded-2xl hover:bg-purple-700">Accueil</button>
        </div>

        <div id="main-content">
            <!-- Menu Accueil -->
            <div id="home-page">
                <div class="text-center mb-16">
                    <h2 class="text-5xl font-bold text-gray-900">Outil Tout-en-Un</h2>
                    <p class="text-xl text-gray-600 mt-4">Choisis l'outil dont tu as besoin</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                    <a onclick="showTool('heic')" class="tool-card cursor-pointer bg-white rounded-3xl p-10 text-center border border-purple-100 hover:border-purple-500">
                        <i class="fas fa-image text-6xl text-purple-500 mb-6"></i>
                        <h3 class="text-2xl font-semibold">HEIC → PNG/JPG</h3>
                    </a>
                    <a onclick="showTool('merge')" class="tool-card cursor-pointer bg-white rounded-3xl p-10 text-center border border-red-100 hover:border-red-500">
                        <i class="fas fa-file-pdf text-6xl text-red-500 mb-6"></i>
                        <h3 class="text-2xl font-semibold">Fusionner PDF</h3>
                    </a>
                    <a onclick="showTool('pdfword')" class="tool-card cursor-pointer bg-white rounded-3xl p-10 text-center border border-blue-100 hover:border-blue-500">
                        <i class="fas fa-file-word text-6xl text-blue-600 mb-6"></i>
                        <h3 class="text-2xl font-semibold">PDF → Word</h3>
                    </a>
                    <a onclick="showTool('compress')" class="tool-card cursor-pointer bg-white rounded-3xl p-10 text-center border border-amber-100 hover:border-amber-500">
                        <i class="fas fa-compress text-6xl text-amber-500 mb-6"></i>
                        <h3 class="text-2xl font-semibold">Compresser PDF</h3>
                    </a>
                </div>
            </div>

            <!-- Les outils seront chargés ici dynamiquement -->
        </div>
    </div>

    <script>
        function goHome() {
            document.getElementById('main-content').innerHTML = document.getElementById('home-page').innerHTML;
        }

        async function handleFileUpload(endpoint, files, format = null) {
            const formData = new FormData();
            for (let file of files) {
                formData.append('files', file);
            }
            if (format) formData.append('format', format);

            const response = await fetch(endpoint, { method: 'POST', body: formData });
            if (!response.ok) throw new Error("Erreur lors du traitement");

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = files.length > 1 ? "result.zip" : "result." + (endpoint.includes('word') ? 'docx' : 'pdf');
            a.click();
        }

        function showTool(tool) {
            let html = '';

            if (tool === 'merge') {
                html = `
                    <div class="max-w-2xl mx-auto">
                        <h2 class="text-4xl font-bold text-center mb-8">Fusionner des PDF</h2>
                        <div id="drop-merge" class="drop-zone border-4 border-dashed border-gray-300 rounded-3xl p-20 text-center cursor-pointer">
                            <i class="fas fa-cloud-upload-alt text-7xl text-gray-400 mb-6"></i>
                            <p class="text-2xl font-medium">Dépose tes fichiers PDF ici</p>
                            <input type="file" id="file-merge" multiple accept=".pdf" class="hidden">
                        </div>
                        <button onclick="mergePDFs()" class="mt-8 w-full bg-red-600 text-white py-6 rounded-3xl text-xl font-semibold">Fusionner les PDF</button>
                    </div>`;
            } else if (tool === 'pdfword') {
                html = `
                    <div class="max-w-2xl mx-auto">
                        <h2 class="text-4xl font-bold text-center mb-8">PDF → Word</h2>
                        <div id="drop-pdfword" class="drop-zone border-4 border-dashed border-gray-300 rounded-3xl p-20 text-center cursor-pointer">
                            <i class="fas fa-cloud-upload-alt text-7xl text-gray-400 mb-6"></i>
                            <p class="text-2xl font-medium">Dépose ton fichier PDF</p>
                            <input type="file" id="file-pdfword" accept=".pdf" class="hidden">
                        </div>
                        <button onclick="pdfToWord()" class="mt-8 w-full bg-blue-600 text-white py-6 rounded-3xl text-xl font-semibold">Convertir en Word</button>
                    </div>`;
            } else if (tool === 'compress') {
                html = `
                    <div class="max-w-2xl mx-auto">
                        <h2 class="text-4xl font-bold text-center mb-8">Compresser PDF</h2>
                        <div id="drop-compress" class="drop-zone border-4 border-dashed border-gray-300 rounded-3xl p-20 text-center cursor-pointer">
                            <i class="fas fa-cloud-upload-alt text-7xl text-gray-400 mb-6"></i>
                            <p class="text-2xl font-medium">Dépose ton fichier PDF</p>
                            <input type="file" id="file-compress" accept=".pdf" class="hidden">
                        </div>
                        <button onclick="compressPDF()" class="mt-8 w-full bg-amber-600 text-white py-6 rounded-3xl text-xl font-semibold">Compresser le PDF</button>
                    </div>`;
            }

            document.getElementById('main-content').innerHTML = html;
        }

        // Drag & Drop functions (à compléter)
        console.log("Site Tout-en-Un chargé");
    </script>
</body>
</html>
