<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusionner PDF - replygen.ca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .drop-zone { transition: all 0.3s ease; }
        .drop-zone.dragover { background-color: #f3e8ff; border-color: #7c3aed; transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-2xl mx-auto py-8 px-6">
    <!-- Navigation commune -->
    <div class="flex justify-between items-center mb-10 border-b pb-6">
        <h1 onclick="window.location.href='/'" class="text-4xl font-bold cursor-pointer text-gray-900">replygen.ca</h1>
        <div class="flex gap-2 text-sm font-medium">
            <a href="/" class="px-5 py-2.5 hover:bg-gray-100 rounded-2xl">Accueil</a>
            <a href="/heic" class="px-5 py-2.5 hover:bg-gray-100 rounded-2xl">HEIC</a>
            <a href="/merge" class="px-5 py-2.5 hover:bg-gray-100 rounded-2xl">Fusion PDF</a>
            <a href="/pdf-to-word" class="px-5 py-2.5 hover:bg-gray-100 rounded-2xl">PDF → Word</a>
            <a href="/compress" class="px-5 py-2.5 hover:bg-gray-100 rounded-2xl">Compress PDF</a>
        </div>
    </div>

    <script>
        // Copie le même comportement que HEIC
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const selectedFilesDiv = document.getElementById('selected-files');
        const dropText = document.getElementById('drop-text');
        const dropSubtext = document.getElementById('drop-subtext');
        const dropIcon = document.getElementById('drop-icon');
        const convertBtn = document.getElementById('convert-btn');

        let selectedFiles = [];

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', () => handleFiles(fileInput.files));

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            if (selectedFiles.length === 0) return;

            let html = `<p class="font-medium mb-2">Fichiers sélectionnés (${selectedFiles.length}) :</p>`;
            selectedFiles.forEach(f => html += `<div class="text-sm text-gray-700 py-1">✅ ${f.name}</div>`);
            selectedFilesDiv.innerHTML = html;
            selectedFilesDiv.classList.remove('hidden');

            dropText.textContent = "Prêt à fusionner !";
            dropSubtext.textContent = "Clique sur le bouton ci-dessous";
            dropIcon.classList.add('text-green-500');
        }

        async function mergePDF() {
            if (selectedFiles.length < 2) return alert("Sélectionne au moins 2 fichiers PDF");

            const formData = new FormData();
            selectedFiles.forEach(file => formData.append('files', file));

            try {
                const res = await fetch('/merge-pdf', { method: 'POST', body: formData });
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "document_fusionne.pdf";
                a.click();
                alert("✅ Fusion terminée ! Le fichier a été téléchargé.");
            } catch (err) {
                alert("Erreur lors de la fusion.");
            }
        }
    </script>
</body>
</html>
